name: Build and Run TCK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '00 6 * * *'
  workflow_dispatch:

env:
  # Ref (branch/tag/SHA) of the TCK
  TCK_VERSION: 1.0.0.alpha1
  TCK_VERSION_0_3: 0.3.0.beta5
  # Tells uv to not need a venv, and instead use system
  UV_SYSTEM_PYTHON: 1
  # Env vars to configure SUT hosts
  SUT_HOST: localhost:8080
  SUT_GRPC_HOST: localhost:9555
  # Slow system on CI
  TCK_STREAMING_TIMEOUT_0_3: 5.0

# Only run the latest job
concurrency:
  group: '${{ github.workflow }} @ ${{ github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  tck-test:
    name: Run TCK 1.0${{ matrix.profile && format(' ({0})', matrix.profile) || '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: ['', 'multi-version']
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Check if SDK version is SNAPSHOT
        run: |
          SDK_VERSION=$(grep -oP '<version\.sdk>\K[^<]+' pom.xml)
          echo "Detected SDK_VERSION: ${SDK_VERSION}"
          echo "SDK_VERSION=${SDK_VERSION}" >> "$GITHUB_ENV"
          if [[ "${SDK_VERSION}" == *"-SNAPSHOT" ]]; then
            echo "IS_SNAPSHOT=true" >> "$GITHUB_ENV"
          else
            echo "IS_SNAPSHOT=false" >> "$GITHUB_ENV"
          fi
      - name: Checkout a2a-java
        if: env.IS_SNAPSHOT == 'true'
        uses: actions/checkout@v6
        with:
          repository: a2aproject/a2a-java
          path: a2a-java
      - name: Checkout a2a-tck
        uses: actions/checkout@v6
        with:
          repository: a2aproject/a2a-tck
          path: a2a-tck
          ref: ${{ env.TCK_VERSION }}
      - name: Build a2a-java with Maven, skipping tests
        if: env.IS_SNAPSHOT == 'true'
        run: |
          mvn -B install -DskipTests
        working-directory: a2a-java
      - name: Get a2a-java version and save as env var
        if: env.IS_SNAPSHOT == 'true'
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout 2>&1 | grep -v '\[')
          echo "Detected a2a-java version: ${VERSION}"
          echo "SDK_VERSION=${VERSION}" >> "$GITHUB_ENV"
        working-directory: a2a-java
      - name: Build the TCK server
        run: |
          mvn clean install -B -Dversion.sdk=${SDK_VERSION} -pl tck -am ${{ matrix.profile && format('-P{0}', matrix.profile) || '' }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "a2a-tck/pyproject.toml"
      - name: Install uv and Python dependencies
        run: |
          pip install uv
          uv pip install -e .
        working-directory: a2a-tck
      - name: Start the WildFly SUT
        run: |
          mvn wildfly:start -B -Dversion.sdk=${SDK_VERSION} -pl tck -Dstartup-timeout=120 -Dwildfly.serverArgs="--stability=preview" ${{ matrix.profile && format('-P{0}', matrix.profile) || '' }}
      - name: Verify agent card
        run: |
          echo "Agent card from http://${{ env.SUT_HOST }}/.well-known/agent-card.json:"
          curl -s http://${{ env.SUT_HOST }}/.well-known/agent-card.json | python3 -m json.tool
      - name: Run TCK
        id: run-tck
        timeout-minutes: 5
        run: |
          set -o pipefail
          uv run ./run_tck.py --sut-host http://${{ env.SUT_HOST }} -v 2>&1 | tee tck-output.log
        working-directory: a2a-tck
      - name: TCK Summary
        if: always() && steps.run-tck.outcome != 'skipped'
        run: |
          if [ -f a2a-tck/tck-output.log ]; then
            SUMMARY=$(sed -n '/^═══/,$p' a2a-tck/tck-output.log)
            if [ -n "$SUMMARY" ]; then
              echo '### TCK 1.0 Results${{ matrix.profile && format(' ({0})', matrix.profile) || '' }}' >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi
      - name: Shutdown the WildFly SUT
        if: always()
        run: |
          mvn wildfly:shutdown -pl tck
      - name: Upload tck server.log
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: tck-server-log-${{ matrix.profile || 'standalone' }}
          path: tck/target/wildfly/standalone/log/server.log
          retention-days: 5

  tck-test-0-3:
    name: Run TCK 0.3${{ matrix.profile && format(' ({0})', matrix.profile) || '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: ['', 'multi-version']
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Check if SDK version is SNAPSHOT
        run: |
          SDK_VERSION=$(grep -oP '<version\.sdk>\K[^<]+' pom.xml)
          echo "Detected SDK_VERSION: ${SDK_VERSION}"
          echo "SDK_VERSION=${SDK_VERSION}" >> "$GITHUB_ENV"
          if [[ "${SDK_VERSION}" == *"-SNAPSHOT" ]]; then
            echo "IS_SNAPSHOT=true" >> "$GITHUB_ENV"
          else
            echo "IS_SNAPSHOT=false" >> "$GITHUB_ENV"
          fi
      - name: Checkout a2a-java
        if: env.IS_SNAPSHOT == 'true'
        uses: actions/checkout@v6
        with:
          repository: a2aproject/a2a-java
          path: a2a-java
      - name: Checkout a2a-tck
        uses: actions/checkout@v6
        with:
          repository: a2aproject/a2a-tck
          path: a2a-tck
          ref: ${{ env.TCK_VERSION_0_3 }}
      - name: Build a2a-java with Maven, skipping tests
        if: env.IS_SNAPSHOT == 'true'
        run: |
          mvn -B install -DskipTests
        working-directory: a2a-java
      - name: Get a2a-java version and save as env var
        if: env.IS_SNAPSHOT == 'true'
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout 2>&1 | grep -v '\[')
          echo "Detected a2a-java version: ${VERSION}"
          echo "SDK_VERSION=${VERSION}" >> "$GITHUB_ENV"
        working-directory: a2a-java
      - name: Build the TCK server
        run: |
          mvn clean install -B -Dversion.sdk=${SDK_VERSION} -pl compat-0.3/tck -am ${{ matrix.profile && format('-P{0}', matrix.profile) || '' }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "a2a-tck/pyproject.toml"
      - name: Install uv and Python dependencies
        run: |
          pip install uv
          uv pip install -e .
        working-directory: a2a-tck
      - name: Start the WildFly SUT
        env:
          SUT_JSONRPC_URL: http://${{ env.SUT_HOST }}
          SUT_REST_URL: http://${{ env.SUT_HOST }}
          SUT_GRPC_URL: http://localhost:9555
        run: |
          mvn wildfly:start -B -Dversion.sdk=${SDK_VERSION} -pl compat-0.3/tck -Dstartup-timeout=120 -Dwildfly.serverArgs="--stability=preview" ${{ matrix.profile && format('-P{0}', matrix.profile) || '' }}
      - name: Verify agent card
        run: |
          echo "Agent card from http://${{ env.SUT_HOST }}/.well-known/agent-card.json:"
          curl -s http://${{ env.SUT_HOST }}/.well-known/agent-card.json | python3 -m json.tool
      - name: Run TCK
        id: run-tck
        timeout-minutes: 5
        env:
          TCK_STREAMING_TIMEOUT: ${{ env.TCK_STREAMING_TIMEOUT_0_3 }}
        run: |
          set -o pipefail
          ./run_tck.py --sut-url http://${{ env.SUT_HOST }} --category all --transports jsonrpc,grpc,rest --compliance-report report.json 2>&1 | tee tck-output.log
        working-directory: a2a-tck
      - name: TCK Summary
        if: always() && steps.run-tck.outcome != 'skipped'
        run: |
          if [ -f a2a-tck/tck-output.log ]; then
            SUMMARY=$(sed -n '/^═══/,$p' a2a-tck/tck-output.log)
            if [ -n "$SUMMARY" ]; then
              echo '### TCK 0.3 Results${{ matrix.profile && format(' ({0})', matrix.profile) || '' }}' >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi
      - name: Shutdown the WildFly SUT
        if: always()
        run: |
          mvn wildfly:shutdown -pl compat-0.3/tck
      - name: Upload tck server.log
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: tck-0.3-server-log-${{ matrix.profile || 'standalone' }}
          path: compat-0.3/tck/target/wildfly/standalone/log/server.log
          retention-days: 5
